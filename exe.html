<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀧 TAROT.EXE :: Rider-Waite-Smith Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --blue:#0000AA;
    --green:#00AA00;
    --cyan:#00AAAA;
    --red:#AA0000;
    --magenta:#AA00AA;
    --brown:#AA5500;
    --lgray:#AAAAAA;
    --dgray:#555555;
    --lblue:#5555FF;
    --lgreen:#55FF55;
    --lcyan:#55FFFF;
    --lred:#FF5555;
    --lmagenta:#FF55FF;
    --yellow:#FFFF55;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--black);
    color:var(--lgray);
    font-family:'VT323', monospace;
    min-height:100%;
    overflow-x:hidden;
  }
  body{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 12px 60px;
  }
  /* CRT scanline overlay */
  body::before{
    content:"";
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.035) 0px,
      rgba(255,255,255,0.035) 1px,
      transparent 2px,
      transparent 3px
    );
    z-index:999;
    mix-blend-mode:overlay;
  }
  body::after{
    content:"";
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    z-index:998;
  }

  .crt-flicker{
    animation:flicker 6s infinite;
  }
  @keyframes flicker{
    0%,96%,100%{opacity:1;}
    97%{opacity:0.92;}
    98%{opacity:1;}
    99%{opacity:0.95;}
  }

  .box{
    white-space:pre;
    line-height:1.15;
    font-family:'VT323', monospace;
  }

  header{
    text-align:center;
    margin-bottom:6px;
    max-width:640px;
    width:100%;
  }
  .title-box{
    color:var(--lcyan);
    font-size:clamp(14px, 3vw, 22px);
    letter-spacing:1px;
  }
  .subtitle{
    color:var(--green);
    font-size:clamp(12px, 2.4vw, 16px);
    letter-spacing:3px;
    margin-top:4px;
  }
  .cursor{
    display:inline-block;
    background:var(--lgreen);
    width:0.6em;
    height:1em;
    vertical-align:middle;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{
    0%,49%{opacity:1;}
    50%,100%{opacity:0;}
  }

  .status-line{
    color:var(--yellow);
    font-size:clamp(13px, 2.6vw, 18px);
    margin:14px 0 20px;
    text-align:center;
    min-height:1.3em;
    letter-spacing:1px;
  }

  .stage{
    perspective:1600px;
    width:min(88vw, 300px);
    margin:0 auto;
  }
  .card{
    position:relative;
    width:100%;
    aspect-ratio: 300 / 520;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform 0.7s cubic-bezier(.4,.2,.2,1);
    outline:none;
  }
  .card:focus-visible .card-face.back{
    box-shadow:0 0 0 3px var(--lcyan);
  }
  .card.flipped{
    transform:rotateY(180deg);
  }
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:4px;
    overflow:hidden;
    background:#000;
  }
  .card-face.back{
    transform:rotateY(0deg);
  }
  .card-face.front{
    transform:rotateY(180deg);
  }
  .card-face svg{
    width:100%;
    height:100%;
    display:block;
  }

  .-hint{
    text-align:center;
    color:var(--lgray);
    font-size:clamp(12px,2.3vw,15px);
    margin-top:14px;
    letter-spacing:1px;
  }
  .-hint .blinktxt{
    color:var(--lgreen);
    animation:blink 1.1s steps(1) infinite;
  }

  .meaning-wrap{
    width:min(90vw, 620px);
    margin-top:26px;
    display:none;
  }
  .meaning-wrap.show{
    display:block;
  }
  .meaning-box{
    border:2px solid var(--lgray);
    padding:16px 18px;
    background:rgba(0,10,0,0.4);
    position:relative;
  }
  .meaning-box .corner{
    position:absolute;
    color:var(--lgray);
    font-size:20px;
    line-height:1;
  }
  .corner.tl{top:-12px;left:-10px;}
  .corner.tr{top:-12px;right:-10px;}
  .corner.bl{bottom:-12px;left:-10px;}
  .corner.br{bottom:-12px;right:-10px;}

  .meaning-title{
    color:var(--lyellow, var(--yellow));
    font-size:clamp(18px,3.4vw,26px);
    letter-spacing:2px;
    margin-bottom:4px;
  }
  .meaning-sub{
    color:var(--cyan);
    font-size:clamp(12px,2.2vw,14px);
    margin-bottom:12px;
    letter-spacing:1px;
  }
  .meaning-text{
    color:var(--white);
    font-size:clamp(15px,2.8vw,19px);
    line-height:1.4;
    min-height:3.6em;
  }
  .meaning-text .caret{
    display:inline-block;
    background:var(--white);
    width:0.55em;
    height:1em;
    vertical-align:middle;
    animation:blink 0.8s steps(1) infinite;
  }

  .footer-actions{
    margin-top:38px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .re-btn{
    background:none;
    border:2px solid var(--lmagenta);
    color:var(--lmagenta);
    font-family:'VT323', monospace;
    font-size:clamp(14px,2.6vw,18px);
    padding:8px 18px;
    cursor:pointer;
    letter-spacing:2px;
  }
  .redraw-btn:hover{
    background:var(--lmagenta);
    color:var(--black);
  }
  .redraw-btn:disabled{
    opacity:0.35;
    cursor:default;
  }
  .redraw-btn:disabled:hover{
    background:none;
    color:var(--lmagenta);
  }

  .ep-btn{
    display:inline-block;
    margin-top:8px;
    text-decoration:none;
    background:none;
    border:2px solid var(--lgreen);
    color:var(--lgreen);
    font-family:'VT323', monospace;
    font-size:clamp(16px,3vw,20px);
    padding:10px 26px;
    letter-spacing:2px;
    transition:background 0.15s, color 0.15s;
  }
  .ep-btn:hover{
    background:var(--lgreen);
    color:var(--black);
  }
  .ep-caption{
    color:var(--dgray);
    font-size:12px;
    margin-top:6px;
    letter-spacing:1px;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .cursor, .blinktxt, .caret{
      transition:none !important;
      animation:none !important;
    }
  }
</style>
</head>

<script>
(function(){
"use strict";

/* ---------- DOS 16-color palette ---------- */
var DOS = {
  black:'#000000', blue:'#0000AA', green:'#00AA00', cyan:'#00AAAA',
  red:'#AA0000', magenta:'#AA00AA', brown:'#AA5500', lgray:'#AAAAAA',
  dgray:'#555555', lblue:'#5555FF', lgreen:'#55FF55', lcyan:'#55FFFF',
  lred:'#FF5555', lmagenta:'#FF55FF', yellow:'#FFFF55', white:'#FFFFFF'
};

/* ---------- generic SVG helpers ---------- */
function frame(color){
  return '<rect x="6" y="6" width="288" height="508" fill="none" stroke="'+color+'" stroke-width="4"/>' +
         '<rect x="14" y="14" width="272" height="492" fill="none" stroke="'+color+'" stroke-width="1.5"/>' +
         '<text x="20" y="26" font-size="16" fill="'+color+'">+</text>' +
         '<text x="272" y="26" font-size="16" fill="'+color+'">+</text>' +
         '<text x="20" y="512" font-size="16" fill="'+color+'">+</text>' +
         '<text x="272" y="512" font-size="16" fill="'+color+'">+</text>';
}

function person(cx, cy, scale, color, rotate){
  rotate = rotate || 0;
  return '<g transform="translate('+cx+','+cy+') rotate('+rotate+') scale('+scale+')">' +
    '<circle cx="0" cy="-70" r="13" fill="none" stroke="'+color+'" stroke-width="3"/>' +
    '<path d="M -18,-56 Q 0,-62 18,-56 L 24,8 L -24,8 Z" fill="'+color+'" fill-opacity="0.18" stroke="'+color+'" stroke-width="2.5"/>' +
    '<line x1="-18" y1="-42" x2="-38" y2="-6" stroke="'+color+'" stroke-width="3"/>' +
    '<line x1="18" y1="-42" x2="38" y2="-6" stroke="'+color+'" stroke-width="3"/>' +
    '<line x1="-10" y1="8" x2="-14" y2="40" stroke="'+color+'" stroke-width="3"/>' +
    '<line x1="10" y1="8" x2="14" y2="40" stroke="'+color+'" stroke-width="3"/>' +
  '</g>';
}

function pillar(cx, cy, h, color){
  return '<g>' +
    '<rect x="'+(cx-14)+'" y="'+(cy-h)+'" width="28" height="'+h+'" fill="none" stroke="'+color+'" stroke-width="3"/>' +
    '<rect x="'+(cx-20)+'" y="'+(cy-h-16)+'" width="40" height="16" fill="'+color+'" fill-opacity="0.5" stroke="'+color+'" stroke-width="2"/>' +
    '<rect x="'+(cx-20)+'" y="'+cy+'" width="40" height="12" fill="'+color+'" fill-opacity="0.5" stroke="'+color+'" stroke-width="2"/>' +
  '</g>';
}

function starPath(cx, cy, rOuter, rInner, points, color, fillOpacity){
  fillOpacity = fillOpacity === undefined ? 0.25 : fillOpacity;
  var path = '', step = Math.PI/points;
  for(var i=0;i<2*points;i++){
    var r = (i%2===0)?rOuter:rInner;
    var a = i*step - Math.PI/2;
    var x = cx + r*Math.cos(a);
    var y = cy + r*Math.sin(a);
    path += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  }
  path += 'Z';
  return '<path d="'+path+'" fill="'+color+'" fill-opacity="'+fillOpacity+'" stroke="'+color+'" stroke-width="2"/>';
}

function sunRays(cx, cy, r, color, rays){
  rays = rays || 12;
  var lines = '';
  for(var i=0;i<rays;i++){
    var a = i*(2*Math.PI/rays);
    var x1 = cx + (r+4)*Math.cos(a), y1 = cy + (r+4)*Math.sin(a);
    var x2 = cx + (r+18)*Math.cos(a), y2 = cy + (r+18)*Math.sin(a);
    lines += '<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+color+'" stroke-width="3"/>';
  }
  return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+color+'" fill-opacity="0.22" stroke="'+color+'" stroke-width="3"/>' + lines;
}

function moonShape(cx, cy, r, color){
  return '<path d="M '+(cx+r*0.5)+','+(cy-r)+' A '+r+','+r+' 0 1 0 '+(cx+r*0.5)+','+(cy+r)+' A '+(r*0.72)+','+(r*0.72)+' 0 1 1 '+(cx+r*0.5)+','+(cy-r)+' Z" fill="'+color+'" fill-opacity="0.3" stroke="'+color+'" stroke-width="2.5"/>';
}

function wavyLine(x, y, w, color, amp, cycles){
  amp = amp || 6; cycles = cycles || 4;
  var d = 'M '+x+','+y+' ', step = w/(cycles*2);
  for(var i=0;i<cycles*2;i++){
    var midx = x + step*i + step/2;
    var cyy = y + (i%2===0? amp : -amp);
    var endx = x + step*(i+1);
    d += 'Q '+midx+','+cyy+' '+endx+','+y+' ';
  }
  return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2.5"/>';
}

function glyph(cx, cy, size, color, ch, opacity){
  opacity = opacity===undefined?1:opacity;
  return '<text x="'+cx+'" y="'+cy+'" font-size="'+size+'" fill="'+color+'" fill-opacity="'+opacity+'" text-anchor="middle" font-family="VT323, monospace">'+ch+'</text>';
}

function lightning(x, yTop, yBot, color){
  var pts = [[x,yTop],[x-14,yTop+40],[x+6,yTop+40],[x-18,yBot]];
  var d = 'M '+pts[0][0]+','+pts[0][1]+' L '+pts[1][0]+','+pts[1][1]+' L '+pts[2][0]+','+pts[2][1]+' L '+pts[3][0]+','+pts[3][1];
  return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="4"/>';
}

/* ---------- card frame wrapper ---------- */
function renderSVG(card){
  var top = card.topLabel ? glyph(150, 36, 15, card.color, card.topLabel) : '';
  var romanLine = card.roman ? glyph(150, 502, 13, DOS.lgray, card.roman) : '';
  return '<svg viewBox="0 0 300 520" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="0" y="0" width="300" height="520" fill="#000"/>' +
    frame(card.color) +
    top +
    card.art +
    glyph(150, 484, 19, card.color, card.name) +
    romanLine +
  '</svg>';
}

/* =====================================================================
   MAJOR ARCANA  (22 cards)
   ===================================================================== */

{ name:'THE FOOL', roman:'0', color:DOS.yellow, topLabel:'MAJOR ARCANA',

       person(150,300,1.05,DOS.white) +
       '<line x1="164" y1="270" x2="190" y2="250" stroke="'+DOS.white+'" stroke-width="3"/>' +
       '<circle cx="192" cy="365" r="8" fill="none" stroke="'+DOS.lgray+'" stroke-width="2"/>' +
       '<path d="M200,362 L212,354" stroke="'+DOS.lgray+'" stroke-width="2"/>',
  meaning:'A leap into the unknown, carried by trust rather than a map. New beginnings, innocence, and the willingness to risk the fall for the sake of the journey.'
},
{ name:'THE MAGICIAN', roman:'I', color:DOS.lred, topLabel:'MAJOR ARCANA',
  art: glyph(150,140,42,DOS.lmagenta,'\u221E') +
       person(150,300,1.05,DOS.lred) +
       '<line x1="164" y1="240" x2="192" y2="196" stroke="'+DOS.lred+'" stroke-width="4"/>' +
       '<line x1="106" y1="390" x2="196" y2="390" stroke="'+DOS.lgray+'" stroke-width="3"/>' +
       glyph(122,382,18,DOS.white,'\u2660') + glyph(140,382,18,DOS.lred,'\u2665') +
       glyph(160,382,18,DOS.lcyan,'\u2666') + glyph(178,382,18,DOS.lgreen,'\u2663'),
  meaning:'Raw potential turned into result. All the tools already sit on the table \u2014 willpower, skill, and resourcefulness only need to be aimed at a goal.'
},
{ name:'THE HIGH PRIESTESS', roman:'II', color:DOS.lblue, topLabel:'MAJOR ARCANA',
  art: pillar(72,410,180,DOS.dgray) + glyph(72,300,16,DOS.dgray,'B') +
       pillar(228,410,180,DOS.lgray) + glyph(228,300,16,DOS.lgray,'J') +
       moonShape(150,150,28,DOS.lcyan) +
       '<line x1="110" y1="230" x2="110" y2="400" stroke="'+DOS.lblue+'" stroke-width="1.5" stroke-dasharray="4,5"/>' +
       '<line x1="190" y1="230" x2="190" y2="400" stroke="'+DOS.lblue+'" stroke-width="1.5" stroke-dasharray="4,5"/>' +
       person(150,320,1.0,DOS.lblue),
  meaning:'The quiet knowing beneath the surface. Intuition, hidden knowledge, and the space between what is spoken and what is only sensed.'
},
{ name:'THE EMPRESS', roman:'III', color:DOS.lgreen, topLabel:'MAJOR ARCANA',
  art: glyph(150,110,26,DOS.yellow,'\u2726 \u2726 \u2726') +
       person(150,300,1.1,DOS.lgreen) +
       glyph(150,258,20,DOS.lred,'\u2665') +
       '<g>' +
         '<line x1="90" y1="410" x2="82" y2="360" stroke="'+DOS.brown+'" stroke-width="2.5"/>' +
         '<line x1="110" y1="415" x2="104" y2="358" stroke="'+DOS.brown+'" stroke-width="2.5"/>' +

         '<circle cx="218" cy="356" r="4" fill="'+DOS.yellow+'"/>' +

},
{ name:'THE EMPEROR', roman:'IV', color:DOS.red, topLabel:'MAJOR ARCANA',
  art: '<rect x="104" y="330" width="92" height="90" fill="none" stroke="'+DOS.red+'" stroke-width="3"/>' +
       '<path d="M104,330 Q88,300 104,278" fill="none" stroke="'+DOS.red+'" stroke-width="2.5"/>' +
       '<path d="M196,330 Q212,300 196,278" fill="none" stroke="'+DOS.red+'" stroke-width="2.5"/>' +

       glyph(190,290,22,DOS.yellow,'\u2625'),

},
{ name:'THE HIEROPHANT', roman:'V', color:DOS.lgray, topLabel:'MAJOR ARCANA',

       pillar(66,410,160,DOS.dgray) + pillar(234,410,160,DOS.dgray) +
       person(150,300,1.05,DOS.lgray) +
       '<line x1="112" y1="380" x2="136" y2="404" stroke="'+DOS.yellow+'" stroke-width="3"/>' +
       '<line x1="136" y1="380" x2="112" y2="404" stroke="'+DOS.yellow+'" stroke-width="3"/>' +
       '<circle cx="112" cy="380" r="4" fill="'+DOS.yellow+'"/><circle cx="136" cy="404" r="4" fill="'+DOS.yellow+'"/>',
  meaning:'Tradition passed down and followed. Shared belief, formal instruction, and the comfort \u2014 or constraint \u2014 of an established rule.'
},
{ name:'THE LOVERS', roman:'VI', color:DOS.lred, topLabel:'MAJOR ARCANA',
  art: sunRays(150,88,20,DOS.yellow,8) +
       person(110,310,0.95,DOS.lblue) + person(190,310,0.95,DOS.lmagenta) +
       '<line x1="150" y1="230" x2="150" y2="150" stroke="'+DOS.lgreen+'" stroke-width="3"/>' +
       '<circle cx="150" cy="145" r="16" fill="none" stroke="'+DOS.lgreen+'" stroke-width="2.5"/>' +

  meaning:'A choice made from the heart, and the alignment that follows it. Partnership, attraction, and the values that decide which path gets taken.'
},
{ name:'THE CHARIOT', roman:'VII', color:DOS.cyan, topLabel:'MAJOR ARCANA',
  art: glyph(112,110,20,DOS.lcyan,'\u2726') + glyph(150,96,20,DOS.lcyan,'\u2726') + glyph(188,110,20,DOS.lcyan,'\u2726') +
       '<rect x="110" y="330" width="80" height="70" fill="none" stroke="'+DOS.cyan+'" stroke-width="3"/>' +
       '<circle cx="118" cy="410" r="16" fill="none" stroke="'+DOS.lgray+'" stroke-width="3"/>' +

var RANK_MEANING = {
  'Ace':'a fresh spark of pure potential, not yet shaped by circumstance',
  '2':'a balance struck, or a choice weighed between two paths',
  '3':'early growth through collaboration and the first visible results',
  '4':'a pause built for stability, structure, and consolidation',
  '5':'friction and disruption that test resolve',
  '6':'harmony restored through cooperation or generosity',
  '7':'a moment of strategy, patience, or quiet reassessment',
  '8':'focused, repetitive effort moving steadily toward mastery',
  '9':'near-completion, carried by resilience and self-reliance',
  '10':'a full cycle, for better or worse, finally realized',
  'Page':'a curious beginner, still learning what this energy can do',
  'Knight':'bold motion \u2014 pursuit, action, energy thrown into the world',
  'Queen':'a mature, inward mastery, nurturing this energy from within',
  'King':'confident, outward authority \u2014 this energy fully commanded'
};

function suitGlyph(suitKey, x, y, scale, color){
  if(suitKey==='Wands'){
    return '<line x1="'+x+'" y1="'+(y+30*scale)+'" x2="'+x+'" y2="'+(y-30*scale)+'" stroke="'+color+'" stroke-width="'+(4*scale)+'"/>' +
      '<line x1="'+(x-9*scale)+'" y1="'+(y-24*scale)+'" x2="'+x+'" y2="'+(y-38*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>' +
      '<line x1="'+(x+9*scale)+'" y1="'+(y-24*scale)+'" x2="'+x+'" y2="'+(y-38*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>';
  }
  if(suitKey==='Cups'){
    return '<path d="M '+(x-14*scale)+','+(y-14*scale)+' Q '+x+','+(y+16*scale)+' '+(x+14*scale)+','+(y-14*scale)+'" fill="none" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>' +
      '<line x1="'+x+'" y1="'+(y-14*scale)+'" x2="'+x+'" y2="'+(y+22*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>' +
      '<line x1="'+(x-10*scale)+'" y1="'+(y+22*scale)+'" x2="'+(x+10*scale)+'" y2="'+(y+22*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>';
  }
  if(suitKey==='Swords'){
    return '<line x1="'+x+'" y1="'+(y-30*scale)+'" x2="'+x+'" y2="'+(y+22*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>' +
      '<line x1="'+(x-12*scale)+'" y1="'+(y-6*scale)+'" x2="'+(x+12*scale)+'" y2="'+(y-6*scale)+'" stroke="'+color+'" stroke-width="'+(3*scale)+'"/>' +
      '<path d="M '+(x-6*scale)+','+(y+22*scale)+' L '+(x+6*scale)+','+(y+22*scale)+' L '+x+','+(y+32*scale)+' Z" fill="'+color+'"/>';
  }
  /* Pentacles */
  return '<circle cx="'+x+'" cy="'+y+'" r="'+(18*scale)+'" fill="none" stroke="'+color+'" stroke-width="'+(2.5*scale)+'"/>' +
    starPath(x,y,13*scale,5.5*scale,5,color,0.35);
}

function pipLayout(n){
  var cols = n===1 ? 1 : 2;
  var rows = Math.ceil(n/cols);
  var positions = [], count = 0;
  var top = 120, bottom = 410, left = 105, right = 195;
  for(var r=0;r<rows;r++){
    var inRow = Math.min(cols, n-count);
    var rowY = top + (bottom-top) * (r/(Math.max(rows-1,1)));
    for(var c=0;c<inRow;c++){
      var rowX = inRow===1 ? 150 : left + (right-left)*(c/(inRow-1));
      positions.push([rowX, rowY]);
      count++;
    }
  }
  return positions;
}

function courtCrown(x, y, color){
  return '<path d="M '+(x-16)+','+y+' L '+(x-9)+','+(y-18)+' L '+x+','+(y-4)+' L '+(x+9)+','+(y-18)+' L '+(x+16)+','+y+' Z" fill="'+color+'" fill-opacity="0.55" stroke="'+color+'" stroke-width="2"/>';
}

function generateMinor(suit, rank){
  var card = { name: rank.toUpperCase()+' OF '+suit.key.toUpperCase(), color: suit.border, topLabel: 'MINOR ARCANA', roman:'' };
  var art = '';
  var isCourt = (rank==='Page'||rank==='Knight'||rank==='Queen'||rank==='King');

  if(!isCourt){
    var n = (rank==='Ace') ? 1 : parseInt(rank,10);
    var pts = pipLayout(n);
    for(var i=0;i<pts.length;i++){
      art += suitGlyph(suit.key, pts[i][0], pts[i][1], 1.0, suit.color);
    }
  } else {
    art += person(150,320,1.05,suit.color);
    if(rank==='Knight'){
      art += '<rect x="112" y="392" width="76" height="22" fill="none" stroke="'+DOS.lgray+'" stroke-width="2.5"/>';
      art += '<line x1="118" y1="414" x2="112" y2="428" stroke="'+DOS.lgray+'" stroke-width="3"/>';
      art += '<line x1="182" y1="414" x2="188" y2="428" stroke="'+DOS.lgray+'" stroke-width="3"/>';
    }
    if(rank==='Queen'||rank==='King'){
      art += courtCrown(150,215,DOS.yellow);
    } else if(rank==='Page'){
      art += '<path d="M 138,220 L150,206 L162,220" fill="none" stroke="'+DOS.yellow+'" stroke-width="2.5"/>';
    }
    art += suitGlyph(suit.key, 196, 300, 0.85, suit.color);
  }

  card.art = art;
  card.meaning = 'The '+rank+' of '+suit.key+' carries '+RANK_MEANING[rank]+', colored by '+suit.meaning+'.';
  return card;
}

var MINORS = [];
SUITS.forEach(function(suit){
  RANKS.forEach(function(rank){
    MINORS.push(generateMinor(suit, rank));
  });
});

var DECK = MAJORS.concat(MINORS); /* 78 cards total */

  for(var r=0;r<10;r++){
    for(var c=0;c<6;c++){
      var x = 30 + c*40, y = 40 + r*46;
      var col = ((r+c)%2===0) ? DOS.lblue : DOS.blue;
      pattern += '<path d="M '+x+','+(y-14)+' L '+(x+14)+','+y+' L '+x+','+(y+14)+' L '+(x-14)+','+y+' Z" fill="none" stroke="'+col+'" stroke-width="2"/>';
    }
  }
  return '<svg viewBox="0 0 300 520" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="0" y="0" width="300" height="520" fill="#000"/>' +
    frame(DOS.lcyan) +

}

    if(i>=text.length){
      clearInterval(typing);
      el.innerHTML = text;
      if(done) done();
    }
  }, 18);
}

function drawCard(){
  if(typing) clearInterval(typing);
  var card = DECK[Math.floor(Math.random()*DECK.length)];
  frontEl.innerHTML = renderSVG(card);

  if(!drawn){
    cardEl.classList.add('flipped');
    drawn = true;
    drawHint.style.display = 'none';
  } else {
    /* quick re-flip pulse for redraw */
    cardEl.style.transition = 'none';
    cardEl.classList.remove('flipped');
    void cardEl.offsetWidth;
    cardEl.style.transition = '';
    requestAnimationFrame(function(){ cardEl.classList.add('flipped'); });
  }

  meaningWrap.classList.add('show');
  meaningTitle.textContent = card.name;
  meaningSub.textContent = (card.roman ? ('MAJOR ARCANA ' + card.roman) : 'MINOR ARCANA') + '  //  UPRIGHT';
  statusLine.textContent = 'C:\\TAROT> CARD DRAWN: ' + card.name + '_';
  redrawBtn.disabled = false;

  setTimeout(function(){
    typeWrite(card.meaning, meaningText);
  }, 350);
}

cardEl.addEventListener('click', drawCard);
cardEl.addEventListener('keydown', function(e){
  if(e.key==='Enter' || e.key===' '){
    e.preventDefault();
    drawCard();
  }
});
redrawBtn.addEventListener('click', drawCard);

})();
</script>
</body>
</html>
